name: Sync main to upstream

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: workflow

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/alam00000/bentopdf.git
          git fetch upstream --prune
          git fetch upstream --tags --force

      - name: Force-update main to upstream/main
        run: |
          git push origin refs/remotes/upstream/main:refs/heads/main --force
